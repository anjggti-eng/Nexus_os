# NexusOS — Coolify Deploy (Orbitan Infra)
# Domínio: nexus.orbitan.com.br
# Banco:   192.168.3.60 (PostgreSQL LXC 102)

networks:
  nexusos-network:
    driver: bridge

services:
  # ─── Infra ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexusos} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexusos-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: nexusos
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nexusos}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Microsserviços ──────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: nexusos-auth-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://orbitan_admin:11bqHRIK9kaGpg33rfMM@192.168.3.60:5432/nexusos
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      AUTH_SERVICE_PORT: 3002
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexusos-network
    labels:
      - "traefik.enable=false"

  command-service:
    build:
      context: .
      dockerfile: apps/command-service/Dockerfile
    container_name: nexusos-command-service
    restart: unless-stopped
    environment:
      COMMAND_SERVICE_PORT: 3004
    networks:
      - nexusos-network

  whatsapp-service:
    build:
      context: .
      dockerfile: apps/whatsapp-service/Dockerfile
    container_name: nexusos-whatsapp-service
    restart: unless-stopped
    environment:
      WHATSAPP_SERVICE_PORT: 3003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nexusos}
    volumes:
      - whatsapp-sessions:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexusos-network

  workflow-service:
    build:
      context: .
      dockerfile: apps/workflow-service/Dockerfile
    container_name: nexusos-workflow-service
    restart: unless-stopped
    environment:
      WORKFLOW_SERVICE_PORT: 3005
      DATABASE_URL: postgresql://orbitan_admin:11bqHRIK9kaGpg33rfMM@192.168.3.60:5432/nexusos
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexusos-network

  infra-service:
    build:
      context: .
      dockerfile: apps/infra-service/Dockerfile
    container_name: nexusos-infra-service
    restart: unless-stopped
    environment:
      INFRA_SERVICE_PORT: 3006
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - nexusos-network

  finance-service:
    build:
      context: .
      dockerfile: apps/finance-service/Dockerfile
    container_name: nexusos-finance-service
    restart: unless-stopped
    environment:
      FINANCE_SERVICE_PORT: 3007
      DATABASE_URL: postgresql://orbitan_admin:11bqHRIK9kaGpg33rfMM@192.168.3.60:5432/nexusos
    networks:
      - nexusos-network

  analytics-service:
    build:
      context: .
      dockerfile: apps/analytics-service/Dockerfile
    container_name: nexusos-analytics-service
    restart: unless-stopped
    environment:
      ANALYTICS_SERVICE_PORT: 3008
    networks:
      - nexusos-network

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: nexusos-ai-service
    restart: unless-stopped
    environment:
      AI_SERVICE_PORT: 3009
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    networks:
      - nexusos-network

  # ─── API Gateway (ponto de entrada) ──────────
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: nexusos-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_PORT: 3000
      API_PREFIX: /api/v1
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me}
    depends_on:
      - auth-service
      - command-service
      - whatsapp-service
      - workflow-service
      - infra-service
      - finance-service
      - analytics-service
      - ai-service
    networks:
      - nexusos-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexusos-api.rule=Host(`nexus.orbitan.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.nexusos-api.entrypoints=websecure"
      - "traefik.http.services.nexusos-api.loadbalancer.server.port=3000"

  # ─── Web Frontend ────────────────────────────
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: nexusos-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://nexus.orbitan.com.br/api/v1
      NEXT_PUBLIC_WS_URL: wss://nexus.orbitan.com.br
    depends_on:
      - api-gateway
    networks:
      - nexusos-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexusos-web.rule=Host(`nexus.orbitan.com.br`)"
      - "traefik.http.routers.nexusos-web.entrypoints=websecure"
      - "traefik.http.services.nexusos-web.loadbalancer.server.port=3000"

volumes:
  redis-data:
  rabbitmq-data:
  whatsapp-sessions:
