# NexusOS — Coolify Deploy (Orbitan Infra)
# Domínio: nexus.orbitan.com.br
# Banco:   192.168.3.60 (PostgreSQL LXC 102)
# Single-container PM2 deployment

networks:
  nexusos-network:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: nexusos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexusos} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexusos-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
    environment:
      RABBITMQ_DEFAULT_USER: nexusos
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nexusos}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexusos-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://orbitan_admin:11bqHRIK9kaGpg33rfMM@192.168.3.60:5432/nexusos
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      API_PORT: "3000"
      API_PREFIX: /api/v1
      AUTH_SERVICE_PORT: "3002"
      COMMAND_SERVICE_PORT: "3004"
      WHATSAPP_SERVICE_PORT: "3003"
      WORKFLOW_SERVICE_PORT: "3005"
      INFRA_SERVICE_PORT: "3006"
      FINANCE_SERVICE_PORT: "3007"
      ANALYTICS_SERVICE_PORT: "3008"
      AI_SERVICE_PORT: "3009"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-nexusos}
      RABBITMQ_DEFAULT_USER: nexusos
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-nexusos}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEXT_PUBLIC_API_URL: https://nexus.orbitan.com.br/api/v1
      NEXT_PUBLIC_WS_URL: wss://nexus.orbitan.com.br
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - whatsapp-sessions:/app/apps/whatsapp-service/sessions
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nexusos-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexusos-api.rule=Host(`nexus.orbitan.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.nexusos-api.entrypoints=websecure"
      - "traefik.http.services.nexusos-api.loadbalancer.server.port=3000"
      - "traefik.http.routers.nexusos-web.rule=Host(`nexus.orbitan.com.br`)"
      - "traefik.http.routers.nexusos-web.entrypoints=websecure"
      - "traefik.http.services.nexusos-web.loadbalancer.server.port=3001"

volumes:
  redis-data:
  rabbitmq-data:
  whatsapp-sessions:
