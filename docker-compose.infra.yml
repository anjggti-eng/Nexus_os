version: "3.9"

networks:
  nexusos-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  clickhouse-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexusos
      POSTGRES_USER: nexusos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusos}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexusos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexusos} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: nexusos-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: nexusos
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-nexusos}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nexusos-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nexusos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexusos_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - nexusos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: nexusos-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9004:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - nexusos-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
